<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', sans-serif;
  background: #fff;
  color: #111;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

* { font-size: inherit; }

nav {
  position: sticky;
  top: 0;
  z-index: 200;
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  height: 54px;
  display: flex;
  align-items: center;
  padding: 0 28px;
}

.nav-inner {
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  text-decoration: none;
  flex-shrink: 0;
  cursor: pointer;
}
.logo img {
  height: 26px;
  width: auto;
  border-radius: 4px;
  object-fit: contain;
}
.logo-name { display: none; }

.nav-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  justify-content: center;
}

.nav-tab {
  padding: 5px 13px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  color: #6b7280;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: 'Roboto', sans-serif;
  transition: background .15s, color .15s;
  text-decoration: none;
  display: inline-block;
  white-space: nowrap;
}
.nav-tab:hover  { background: #f3f4f6; color: #111; }
.nav-tab.active { background: #f3f4f6; color: #111; font-weight: 600; }

.nav-cta {
  flex-shrink: 0;
  padding: 6px 15px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  white-space: nowrap;
  transition: opacity .15s;
}
.nav-cta:hover { opacity: .82; }

.page { display: none; }
.page.active { display: block; }

.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 36px 24px 80px;
}

.all-good-banner {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 24px;
}

.banner-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #16a34a;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .3s;
}
.banner-icon svg { width: 11px; height: 11px; }
.banner-text { font-size: 15px; font-weight: 600; color: #111; }

.group {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  overflow: visible;
  margin-bottom: 14px;
}

.group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 20px;
  background: #f3f4f6;
  border-bottom: 1px solid #e5e7eb;
  border-radius: 12px 12px 0 0;
  cursor: pointer;
  user-select: none;
}
.group-header.collapsed { border-radius: 12px; border-bottom: none; }

.group-name { font-size: 14px; font-weight: 600; color: #111; }
.group-right { display: flex; align-items: center; gap: 7px; }

.group-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500; color: #16a34a;
}

.mini-check {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #16a34a;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.mini-check svg { width: 9px; height: 9px; }

.chevron {
  width: 15px; height: 15px;
  color: #9ca3af;
  transition: transform .2s;
}
.group-header.collapsed .chevron { transform: rotate(-90deg); }

.group-body { overflow: visible; }
.group-body.hidden { display: none; }

.service-item {
  padding: 14px 20px;
  border-bottom: 1px solid #f0f0f0;
  overflow: visible;
}
.service-item:last-child { border-bottom: none; border-radius: 0 0 12px 12px; }

.service-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 9px;
}
.service-left { display: flex; align-items: center; gap: 7px; }
.s-name   { font-size: 13px; font-weight: 500; color: #111; }
.s-uptime { font-size: 13px; font-weight: 500; color: #16a34a; }

.bar-wrap { position: relative; overflow: visible; }

.bar-row {
  display: flex;
  gap: 2px;
  height: 22px;
  align-items: stretch;
  overflow: visible;
}

.bar-seg {
  flex: 1;
  border-radius: 3px;
  cursor: default;
  position: relative;
}
.bar-seg:hover { outline: 2px solid rgba(0,0,0,0.18); outline-offset: -1px; }
.bar-seg.up       { background: #22c55e; }
.bar-seg.degraded { background: #f59e0b; }
.bar-seg.down     { background: #ef4444; }
.bar-seg.nodata   { background: #e5e7eb; }

.bar-seg .seg-tip {
  display: none;
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.14);
  padding: 12px 14px;
  width: 230px;
  z-index: 9999;
  pointer-events: none;
  text-align: left;
}

.bar-seg:first-child .seg-tip,
.bar-seg:nth-child(2) .seg-tip { left: 0; transform: none; }
.bar-seg:last-child .seg-tip,
.bar-seg:nth-last-child(2) .seg-tip { left: auto; right: 0; transform: none; }

.bar-seg:hover .seg-tip { display: block; }

.tip-icon-row {
  display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px;
}
.tip-icon {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.tip-icon.deg     { background: #f59e0b; }
.tip-icon.down-ic { background: #ef4444; }
.tip-icon.ok      { background: #22c55e; }
.tip-icon svg { width: 10px; height: 10px; }

.tip-title {
  font-size: 13px;
  font-weight: 600;
  color: #111;
  line-height: 1.4;
}

.tip-meta {
  font-size: 11px;
  color: #6b7280;
  margin-top: 5px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-left: 26px;
}

.tip-date {
  font-size: 11px;
  color: #9ca3af;
  margin-top: 7px;
  padding-top: 7px;
  border-top: 1px solid #f0f0f0;
}

.bar-labels {
  display: flex; justify-content: space-between;
  margin-top: 5px;
  font-size: 11px; color: #9ca3af;
}

.page-title {
  font-size: 16px;
  font-weight: 700;
  color: #111;
  text-align: center;
  margin-bottom: 14px;
}

.date-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 9px; margin-bottom: 32px;
}
.date-nav-btn {
  width: 26px; height: 26px;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #6b7280; font-size: 14px;
  font-family: 'Roboto', sans-serif;
  transition: background .15s, opacity .15s;
}
.date-nav-btn:hover:not(:disabled) { background: #f3f4f6; }
.date-nav-btn:disabled { opacity: 0.35; cursor: default; }
.date-range-lbl { font-size: 13px; font-weight: 500; color: #374151; min-width: 220px; text-align: center; }

.month-block {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 14px;
}
.month-lbl { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 14px; }

.empty-state {
  display: flex; align-items: center; justify-content: center;
  gap: 7px; padding: 20px 0;
  color: #9ca3af; font-size: 13px;
}
.empty-dot {
  width: 16px; height: 16px; border-radius: 50%; background: #d1d5db;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.empty-dot svg { width: 9px; height: 9px; }

.inc-date-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 10px;
}
.inc-date-lbl { font-size: 12px; font-weight: 500; color: #6b7280; }
.inc-cnt      { font-size: 12px; color: #9ca3af; }

.inc-card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 15px 17px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: box-shadow .15s, border-color .15s;
}
.inc-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.07); border-color: #d1d5db; }

.inc-card-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 11px;
}
.inc-title { font-size: 14px; font-weight: 600; color: #111; }

.badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 6px;
  flex-shrink: 0; margin-left: 10px;
}
.badge-degraded { background: #fef3c7; color: #92400e; }
.badge-outage   { background: #fee2e2; color: #991b1b; }

.tl-entry {
  background: #f9fafb; border: 1px solid #e5e7eb;
  border-radius: 8px; padding: 11px 13px; margin-bottom: 6px;
}
.tl-top { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.tl-status { font-size: 12px; font-weight: 600; color: #111; }
.tl-time   { font-size: 11px; color: #9ca3af; }
.tl-msg    { font-size: 12px; color: #374151; line-height: 1.55; }

.prev-btn {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: #6b7280; cursor: pointer;
  padding: 5px 0 1px; background: none; border: none;
  font-family: 'Roboto', sans-serif;
  transition: color .15s;
}
.prev-btn:hover { color: #111; }

.hidden-updates { display: none; margin-top: 6px; }
.hidden-updates.open { display: block; }

.back-btn {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 500; color: #6b7280;
  background: #f3f4f6; border: 1px solid #e5e7eb;
  border-radius: 8px; padding: 7px 13px;
  cursor: pointer; margin-bottom: 24px;
  transition: background .15s, color .15s;
  text-decoration: none;
}
.back-btn:hover { background: #e9eaec; color: #111; }
.back-btn svg { width: 14px; height: 14px; }

.detail-card {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 24px 26px;
  margin-bottom: 14px;
}
.detail-badge-row { margin-bottom: 10px; }

  font-size: 20px; font-weight: 700; color: #111;

}

.detail-divider { border: none; border-top: 1px solid #e5e7eb; margin: 18px 0; }

.tl-item { display: flex; gap: 14px; margin-bottom: 10px; }

.tl-circle.resolved     { background: #16a34a; }

.tl-circle svg { width: 11px; height: 11px; }
.tl-line { width: 1px; flex: 1; background: #e5e7eb; margin: 4px 0; min-height: 16px; }

.tl-content-top {

}
.tl-content-status { font-size: 13px; font-weight: 600; color: #111; }
.tl-content-time   { font-size: 12px; color: #9ca3af; }
.tl-content-msg    { font-size: 13px; color: #374151; line-height: 1.55; }

.pg-footer {
  margin-top: 36px; padding-top: 20px; border-top: 1px solid #f0f0f0;

}
.pg-footer a { color: #6b7280; text-decoration: none; }
.pg-footer a:hover { color: #111; }

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.28); z-index: 500;

}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 13px; padding: 26px;
  width: 370px; max-width: calc(100vw - 32px);
  box-shadow: 0 20px 60px rgba(0,0,0,.12);

}
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #111; }

.modal input[type=email] {
  width: 100%; border: 1px solid #d1d5db; border-radius: 7px;
  padding: 8px 12px; font-size: 13px; font-family: 'Roboto', sans-serif;
  margin-bottom: 13px; outline: none; transition: border-color .15s; color: #111;
}
.modal input[type=email]:focus { border-color: #111; }
.modal-btns { display: flex; gap: 7px; justify-content: flex-end; }
.btn-cancel {
  padding: 7px 15px; border: 1px solid #d1d5db; border-radius: 7px;

.btn-sub {
  padding: 7px 15px; background: #111; color: #fff; border: none;
  border-radius: 7px; font-size: 13px; cursor: pointer;

@media(max-width:780px) {
  nav {
    height: auto;
    min-height: 54px;
    padding: 8px 20px;
    align-items: flex-start;
  }
  .nav-inner {
    flex-wrap: wrap;
    align-items: center;
    row-gap: 6px;
  }
  .logo {
    flex: 0 0 auto;
  }
  .nav-cta {
    flex: 0 0 auto;
    margin-left: auto;
  }
  .nav-tabs {
    order: 3;
    flex: 0 0 100%;
    justify-content: flex-start;
    margin: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .content { padding: 28px 20px 70px; }
}

@media(max-width:600px) {
  nav { padding: 8px 14px; }
  .content { padding: 22px 14px 60px; }
  .nav-tab { font-size: 12px; padding: 5px 10px; }
  .nav-cta { font-size: 12px; padding: 5px 12px; }
  .all-good-banner { padding: 14px 16px; }
  .banner-text { font-size: 14px; }
  .group-header { padding: 11px 14px; }
  .group-name { font-size: 13px; }
  .service-item { padding: 12px 14px; }
  .service-top { flex-wrap: wrap; gap: 4px; }
  .s-uptime { font-size: 12px; }
  .bar-row { height: 18px; gap: 1px; }
  .bar-seg { border-radius: 2px; }
  .bar-seg .seg-tip {
    left: 0 !important;

    width: 200px;
  }
  .page-title { font-size: 14px; }
  .date-range-lbl { font-size: 12px; min-width: 0; }
  .month-block { padding: 14px; }
  .inc-card { padding: 12px 13px; }
  .inc-card-hdr { flex-wrap: wrap; gap: 5px; align-items: flex-start; }

}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="logo" onclick="navigate('/status')">
      <img id="navLogo" alt="AmpCart">
      <span class="logo-name" id="navName"></span>
    </span>
    <div class="nav-tabs">
      <button id="tab-status"      class="nav-tab" onclick="navigate('/status')">Status</button>
      <button id="tab-maintenance" class="nav-tab" onclick="navigate('/maintenance')">Maintenance</button>
      <button id="tab-incidents"   class="nav-tab" onclick="navigate('/incidents')">Previous incidents</button>
    </div>
   </div>
</nav>

<div class="page" id="page-status">
  <div class="content">
    <div class="all-good-banner" id="allGoodBanner">
      <div class="banner-icon" id="bannerIcon">
        <svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="banner-text" id="bannerText">All services are online</span>
    </div>
    <div id="groupsContainer"></div>
    <div class="pg-footer">
      Last checked: <span id="lastChecked">—</span> &nbsp;·&nbsp;
      <a id="footerLink" href="#" target="_blank"></a>
    </div>
  </div>
</div>

<div class="page" id="page-maintenance">
  <div class="content">
    <div class="page-title">Maintenance</div>
    <div class="date-nav">
      <button class="date-nav-btn" id="maintPrevBtn" onclick="shiftMaint(-1)">&#8249;</button>
      <span class="date-range-lbl" id="maintRange"></span>
      <button class="date-nav-btn" id="maintNextBtn" onclick="shiftMaint(1)">&#8250;</button>
    </div>
    <div id="maintContainer"></div>
    <div class="pg-footer"><a id="maintLink" href="#" target="_blank"></a></div>
  </div>
</div>

<div class="page" id="page-incidents">
  <div class="content">
    <div class="page-title">Previous incidents</div>
    <div class="date-nav">
      <button class="date-nav-btn" id="incPrevBtn" onclick="shiftInc(-1)">&#8249;</button>
      <span class="date-range-lbl" id="incRange"></span>
      <button class="date-nav-btn" id="incNextBtn" onclick="shiftInc(1)">&#8250;</button>
    </div>
    <div id="incContainer"></div>
    <div class="pg-footer"><a id="incLink" href="#" target="_blank"></a></div>
  </div>
</div>

<div class="page" id="page-incident-detail">
  <div class="content">
    <button class="back-btn" onclick="navigate('/incidents')">
      <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to incidents
    </button>
    <div id="incidentDetailContent"></div>
    <div class="pg-footer"><a id="detailLink" href="#" target="_blank"></a></div>
  </div>
</div>

 

<script>
const $ = id => document.getElementById(id);
const svgCheck = `<svg viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2.5 2.5 4.5-4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const svgExcl  = `<svg viewBox="0 0 10 10" fill="none"><path d="M5 2v4M5 7.5v.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>`;

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function getMonthYear(key) {
  const [name, year] = key.split(' ');
  return { month: MONTH_NAMES.indexOf(name), year: parseInt(year) };
}

function monthLabel(month, year) {
  return `${MONTH_NAMES[month]} ${year}`;
}

function navigate(path, push = true) {
  if (push) history.pushState({}, '', path);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (path === '/' || path === '/status' || path === '') {
    $('page-status').classList.add('active');
    $('tab-status').classList.add('active');
  } else if (path === '/maintenance') {
    $('page-maintenance').classList.add('active');
    $('tab-maintenance').classList.add('active');
  } else if (path === '/incidents') {
    $('page-incidents').classList.add('active');
    $('tab-incidents').classList.add('active');
  } else if (path.startsWith('/incident/')) {
    const slug = path.slice('/incident/'.length);
    buildAndShowIncidentDetail(slug);
    $('page-incident-detail').classList.add('active');
    $('tab-incidents').classList.add('active');
  } else {
    $('page-status').classList.add('active');
    $('tab-status').classList.add('active');
  }
}

window.addEventListener('popstate', () => navigate(location.pathname, false));

function toggleGroup(hdr) {
  hdr.classList.toggle('collapsed');
  hdr.nextElementSibling.classList.toggle('hidden');
}

function toggleUpdates(btn) {
  const box = btn.nextElementSibling;
  box.classList.toggle('open');
  btn.textContent = box.classList.contains('open') ? '▲ Hide updates' : `▾ ${btn.dataset.count} previous update${btn.dataset.count>1?'s':''}`;
}

function getDateLabel(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - (daysAgo - 1));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function buildBar(history) {
  const segs = history.map(h => {
    const dateStr = getDateLabel(h.day);
    let iconClass = 'ok', iconSVG = svgCheck;
    if (h.status === 'degraded') { iconClass = 'deg';     iconSVG = svgExcl; }
    if (h.status === 'down')     { iconClass = 'down-ic'; iconSVG = svgExcl; }
    let tipInner = '';
    if (h.status === 'up' || !h.incident) {
      tipInner = `
        <div class="tip-icon-row">
          <div class="tip-icon ok">${svgCheck}</div>
          <span class="tip-title">No incidents</span>
        </div>
        <div class="tip-date">${dateStr}</div>`;
    } else {
      const label = h.status === 'down' ? 'Outage' : 'Degraded';
      tipInner = `
        <div class="tip-icon-row">
          <div class="tip-icon ${iconClass}">${iconSVG}</div>
          <span class="tip-title">${h.incident}</span>
        </div>
        <div class="tip-meta">
          <span>${label} for ${h.duration}</span>
        </div>
        <div class="tip-date">${dateStr}</div>`;
    }
    return `<div class="bar-seg ${h.status === 'up' ? 'up' : h.status}">
      <div class="seg-tip">${tipInner}</div>
    </div>`;
  });
  return `<div class="bar-row">${segs.join('')}</div>
    <div class="bar-labels"><span>30 days ago</span><span>Today</span></div>`;
}

function buildService(svc) {
  return `
    <div class="service-item">
      <div class="service-top">
        <div class="service-left">
          <div class="mini-check">${svgCheck}</div>
          <span class="s-name">${svc.name}</span>
        </div>
        <span class="s-uptime">${svc.uptime.toFixed(2)}% uptime</span>
      </div>
      <div class="bar-wrap">${buildBar(svc.history)}</div>
    </div>`;
}

function buildGroups() {
  const container = $('groupsContainer');
  container.innerHTML = STATUS_DATA.groups.map(g => {
    const services = g.services.map(buildService).join('');
    return `
      <div class="group">
        <div class="group-header" onclick="toggleGroup(this)">
          <span class="group-name">${g.name}</span>
          <div class="group-right">
            <div class="group-status">
              <div class="mini-check">${svgCheck}</div>
              Operational
            </div>
            <svg class="chevron" viewBox="0 0 16 16" fill="none">
              <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="group-body">${services}</div>
      </div>`;
  }).join('');
}

function getMonthWindow(anchorMonth, anchorYear, pageOffset, count = 3) {
  let m = anchorMonth - pageOffset * count;
  let y = anchorYear;
  while (m < 0)  { m += 12; y--; }
  while (m > 11) { m -= 12; y++; }
  const result = [];
  for (let i = 0; i < count; i++) {
    result.push({ label: monthLabel(m, y), month: m, year: y });
    m--;
    if (m < 0) { m = 11; y--; }
  }
  return result;
}

const MAINT_ANCHOR = getMonthYear(STATUS_DATA.maintenance[STATUS_DATA.maintenance.length - 1].month);
let maintPage = 0;
const maintLookup = {};
STATUS_DATA.maintenance.forEach(m => { maintLookup[m.month] = m; });

function buildMaintenance() {
  const win = getMonthWindow(MAINT_ANCHOR.month, MAINT_ANCHOR.year, maintPage);
  const oldest = win[win.length - 1];
  const newest = win[0];
  $('maintRange').textContent = `${oldest.label} – ${newest.label}`;
  $('maintNextBtn').disabled = maintPage === 0;
  $('maintPrevBtn').disabled = false;
  $('maintContainer').innerHTML = win.map(w => {
    const data = maintLookup[w.label];
    const events = data ? data.events : [];
    return `
      <div class="month-block">
        <div class="month-lbl">${w.label}</div>
        ${events.length === 0
          ? `<div class="empty-state"><div class="empty-dot">${svgCheck}</div>No maintenance scheduled</div>`
          : events.map(e => `<div>${e.title}</div>`).join('')}
      </div>`;
  }).join('');
}

function shiftMaint(dir) {
  const newPage = maintPage - dir;
  if (newPage < 0) return;
  maintPage = newPage;
  buildMaintenance();
}

const INC_ANCHOR = getMonthYear(STATUS_DATA.incidents[0].month);
let incPage = 0;
const incLookup = {};
STATUS_DATA.incidents.forEach(m => { incLookup[m.month] = m; });

function buildIncidents() {
  const win = getMonthWindow(INC_ANCHOR.month, INC_ANCHOR.year, incPage);
  const oldest = win[win.length - 1];
  const newest = win[0];
  $('incRange').textContent = `${oldest.label} – ${newest.label}`;
  $('incNextBtn').disabled = incPage === 0;
  $('incPrevBtn').disabled = false;
  $('incContainer').innerHTML = win.map(w => {
    const data = incLookup[w.label];
    const events = data ? data.events : [];
    let body = '';
    if (events.length === 0) {
      body = `<div class="empty-state"><div class="empty-dot">${svgCheck}</div>No incidents reported</div>`;
    } else {
      const byDate = {};
      events.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });
      body = Object.entries(byDate).map(([date, evts]) => {
        const cards = evts.map(e => {
          const slug = slugify(e.title);
          const firstUpdate = e.updates[0];
          return `
            <div class="inc-card" onclick="navigate('/incident/${slug}')">
              <div class="inc-card-hdr">
                <span class="inc-title">${e.title}</span>
                <span class="badge badge-${e.severity === 'outage' ? 'outage' : 'degraded'}">${e.severity.charAt(0).toUpperCase()+e.severity.slice(1)}</span>
              </div>
              <div class="tl-entry">
                <div class="tl-top">
                  <div class="mini-check">${svgCheck}</div>
                  <span class="tl-status">${firstUpdate.status}</span>
                  <span class="tl-time">${firstUpdate.time}</span>
                </div>
                <div class="tl-msg">${firstUpdate.message}</div>
              </div>
            </div>`;
        }).join('');
        return `
          <div class="inc-date-row">
            <span class="inc-date-lbl">${date}</span>
            <span class="inc-cnt">${evts.length} incident${evts.length>1?'s':''}</span>
          </div>
          ${cards}`;
      }).join('');
    }
    return `<div class="month-block"><div class="month-lbl">${w.label}</div>${body}</div>`;
  }).join('');
}

function shiftInc(dir) {
  const newPage = incPage - dir;
  if (newPage < 0) return;
  incPage = newPage;
  buildIncidents();
}

function findIncidentBySlug(slug) {
  for (const month of STATUS_DATA.incidents) {
    for (const event of month.events) {
      if (slugify(event.title) === slug) return event;
    }
  }
  return null;
}

function tlCircleClass(status) {
  const s = status.toLowerCase();
  if (s === 'resolved') return 'resolved';
  if (s === 'identified') return 'identified';
  return 'investigating';
}

function tlCircleIcon(status) {
  const s = status.toLowerCase();
  if (s === 'resolved') return svgCheck;
  if (s === 'identified') return `<svg viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" stroke="#fff" stroke-width="1.4"/></svg>`;
  return '';
}

function buildAndShowIncidentDetail(slug) {
  const event = findIncidentBySlug(slug);
  const container = $('incidentDetailContent');
  if (!event) {
    container.innerHTML = `<div class="detail-card"><p style="color:#6b7280;font-size:14px;">Incident not found.</p></div>`;
    return;
  }
  const firstUpdate = event.updates[0];
  const allUpdates = event.updates;
  const affected = event.affectedServices || [];
  const timelineItems = allUpdates.map((u, i) => {
    const isLast = i === allUpdates.length - 1;
    return `
      <div class="tl-item">
        <div class="tl-icon-col">
          <div class="tl-circle ${tlCircleClass(u.status)}">${tlCircleIcon(u.status)}</div>
          ${!isLast ? '<div class="tl-line"></div>' : ''}
        </div>
        <div class="tl-content">
          <div class="tl-content-top">
            <span class="tl-content-status">${u.status}</span>
            <span class="tl-content-time">${u.time}</span>
          </div>
          <div class="tl-content-msg">${u.message}</div>
        </div>
      </div>`;
  }).join('');
  const affectedHTML = affected.length > 0
    ? `<hr class="detail-divider">
       <div class="detail-affected">
         <span class="detail-affected-lbl">Affected services</span>
         ${affected.map(s => `<span class="service-tag">${s}</span>`).join('')}
       </div>`
    : '';
  container.innerHTML = `
    <div class="detail-card">
      <div class="detail-badge-row">
        <span class="badge badge-${event.severity === 'outage' ? 'outage' : 'degraded'}">${event.severity.charAt(0).toUpperCase()+event.severity.slice(1)}</span>
      </div>
      <div class="detail-title">${event.title}</div>
      <div class="detail-date">${firstUpdate.time}</div>
      ${affectedHTML}
    </div>
    <div class="detail-timeline">${timelineItems}</div>`;
}

async function ping(url) {
  if (!url) return 40;
  const t = performance.now();
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    await fetch(url, { mode: 'no-cors', cache: 'no-store', signal: ctrl.signal });
    clearTimeout(timer);
    return Math.round(performance.now() - t);
  } catch(e) {
    return e.name === 'AbortError' ? -1 : Math.round(performance.now() - t);
  }
}

async function runChecks() {
  $('lastChecked').textContent = 'checking…';
  const allServices = STATUS_DATA.groups.flatMap(g => g.services);
  const results = await Promise.all(allServices.map(s => ping(s.url)));
  const anyDown = results.some(r => r < 0);
  const icon = $('bannerIcon');
  const text = $('bannerText');
  if (anyDown) {
    icon.style.background = '#dc2626';
    text.textContent = 'Service disruption detected';
  } else {
    icon.style.background = '#16a34a';
    text.textContent = 'All services are online';
  }
  const now = new Date();
  $('lastChecked').textContent =
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + ' UTC';
}

function handleSubscribe() {
  const email = $('subEmail').value.trim();
  if (!email || !email.includes('@')) { alert('Please enter a valid email.'); return; }
  $('subModal').classList.remove('open');
  $('subEmail').value = '';
  alert('Subscribed! Updates will be sent to ' + email);
}

(function init() {
  const co = STATUS_DATA.company;
  $('navLogo').src = co.logo;
  $('navName').textContent = co.name;
  $('footerLink').href = co.website;
  $('footerLink').textContent = co.website.replace('https://', '');
  $('maintLink').href = co.website;
  $('maintLink').textContent = co.website.replace('https://', '');
  $('incLink').href = co.website;
  $('incLink').textContent = co.website.replace('https://', '');
  $('detailLink').href = co.website;
  $('detailLink').textContent = co.website.replace('https://', '');
  buildGroups();
  buildMaintenance();
  buildIncidents();

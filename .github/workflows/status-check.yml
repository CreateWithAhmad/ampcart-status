name: AmpCart Status Check

on:
  schedule:
    - cron: "*/5 * * * *"   # runs every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check health endpoint
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.ampcart.com/health || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Generate status.json
        run: |
          if [ "${{ steps.health.outputs.status }}" = "200" ]; then
            STATE="up"
          else
            STATE="down"
          fi

          echo "{
            \"database\": \"$STATE\",
            \"checked_at\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"
          }" > status.json

      - name: Commit and push if changed
        run: |
          git config user.name "ampcart-status-bot"
          git config user.email "bot@ampcart.com"

          git add status.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update system status"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi

name: AmpCart Status Check

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Call Supabase health function
        id: health
        run: |
          STATUS=$(curl -s -X POST https://pfwucwaxfznngtudnfqy.supabase.co/functions/v1/health \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -o /dev/null \
            -w "%{http_code}" \
            --max-time 10 || echo "000")

          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Generate status.json
        run: |
          if [ "${{ steps.health.outputs.status }}" = "200" ]; then
            STATE="up"
          else
            STATE="down"
          fi

          cat <<EOF > status.json
          {
            "database": "$STATE",
            "checked_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "ampcart-status-bot"
          git config user.email "bot@ampcart.com"

          git add status.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update system status"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi
